<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Track The Hill</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1410;--paper:#f5f0e8;--cream:#ede8dc;
  --rust:#c0392b;--gold:#b8860b;--muted:#7a6f61;
  --border:#c8bfb0;--white:#fdfaf5;
  --house:#1a3a6b;--senate:#6b1a1a;
  --dem:#1a3a6b;--rep:#c0392b;--ind:#b8860b
}
body{background:var(--paper);font-family:'Source Serif 4',Georgia,serif}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--white);display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.15)}
.header{background:var(--ink);color:var(--paper);padding:20px 20px 0;border-bottom:3px solid var(--rust);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.masthead{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;letter-spacing:-.5px;line-height:1}
.masthead span{color:var(--rust)}
.edition{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.live-badge{background:var(--rust);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:2px;text-transform:uppercase;letter-spacing:1px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.nav{display:flex;margin-top:12px}
.nav-btn{flex:1;background:none;border:none;color:var(--muted);font-family:'Source Serif 4',serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;padding:10px 2px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.nav-btn.active{color:var(--paper);border-bottom:2px solid var(--rust)}
.search-bar{padding:12px 16px;background:var(--cream);border-bottom:1px solid var(--border);display:flex;gap:8px}
.search-input{flex:1;border:1px solid var(--border);background:var(--white);font-family:'Source Serif 4',serif;font-size:14px;padding:9px 12px;color:var(--ink);outline:none;border-radius:2px}
.search-input:focus{border-color:var(--rust)}
.search-btn{background:var(--rust);color:#fff;border:none;padding:9px 16px;font-family:'Source Serif 4',serif;font-size:13px;font-weight:600;cursor:pointer;border-radius:2px}
.filter-bar{display:flex;gap:6px;padding:10px 16px;background:var(--cream);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--white);border:1px solid var(--border);color:var(--muted);font-family:'Source Serif 4',serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.active{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.chip.house.active{background:var(--house);border-color:var(--house)}
.chip.senate.active{background:var(--senate);border-color:var(--senate)}
.content{flex:1;overflow-y:auto;padding-bottom:20px}
.section-label{display:flex;align-items:center;gap:10px;padding:16px 16px 8px}
.section-label span{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;white-space:nowrap}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--rust);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);margin-bottom:8px}
.empty-sub{font-size:14px;line-height:1.6}
.error-box{background:#fdedec;border:1px solid #f1948a;padding:12px 16px;margin:12px 16px;border-radius:2px;font-size:13px;color:var(--rust)}
/* BILL CARD */
.bill-card{border-bottom:1px solid var(--border);cursor:pointer}
.bill-card-hd{padding:16px;transition:background .15s}
.bill-card:hover .bill-card-hd,.bill-card.open .bill-card-hd{background:var(--cream)}
.bill-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bill-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--rust)}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.b-intro{background:#e8f4f8;color:#2980b9}
.b-pass{background:#eafaf1;color:#27ae60}
.b-comm{background:#fef9e7;color:#d4ac0d}
.b-fail{background:#fdedec;color:var(--rust)}
.b-sign{background:#d5f5e3;color:#1e8449}
.b-house{background:#dce8f7;color:var(--house)}
.b-senate{background:#fde8e8;color:var(--senate)}
.b-roll{background:#fef9e7;color:var(--gold)}
.b-voice{background:#f0f0f0;color:var(--muted)}
.b-law{background:#d5f5e3;color:#1e8449}
.b-eo{background:#f0eafa;color:#5a3e8a}
.bill-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:8px}
.bill-snippet{font-size:14px;color:#4a3f35;line-height:1.65;font-style:italic;margin-bottom:8px}
.bill-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.bill-date{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.expand-lbl{font-size:11px;color:var(--rust);font-weight:700;text-transform:uppercase;letter-spacing:1px}
/* EXPANDED */
.bill-body{border-top:1px solid var(--border);animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.summary-box{border-left:3px solid var(--gold);background:#fdf8f0;padding:12px 14px}
.summary-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:6px}
.summary-txt{font-size:14px;line-height:1.7;color:var(--ink)}
.eo-summary-box{border-left:3px solid #5a3e8a;background:#f8f5fd;padding:12px 14px}
.eo-summary-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#5a3e8a;margin-bottom:6px}
.facts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.fact{background:var(--white);padding:10px 12px}
.fact-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:3px}
.fact-val{font-size:13px;color:var(--ink);font-weight:600;line-height:1.3}
.ch-tabs{display:flex;border-bottom:2px solid var(--border)}
.ch-tab{flex:1;padding:11px 12px;font-family:'Source Serif 4',serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--muted)}
.ch-tab.house.active{color:var(--house);border-bottom-color:var(--house);background:#f0f4fa}
.ch-tab.senate.active{color:var(--senate);border-bottom-color:var(--senate);background:#faf0f0}
.ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ch-dot.house{background:var(--house)}
.ch-dot.senate{background:var(--senate)}
.ch-cnt{font-size:10px;background:var(--border);color:var(--muted);border-radius:10px;padding:1px 6px;font-weight:700}
.ch-tab.house.active .ch-cnt{background:#c8d8f0;color:var(--house)}
.ch-tab.senate.active .ch-cnt{background:#f0c8c8;color:var(--senate)}
.ch-body{padding:14px 16px}
.ch-intro{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ch-intro::after{content:'';flex:1;height:1px;background:var(--border)}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:18px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-17px;top:5px;width:10px;height:10px;border-radius:50%;border:2px solid var(--white);z-index:1}
.tl-dot.house{background:var(--house);box-shadow:0 0 0 2px #c8d8f0}
.tl-dot.senate{background:var(--senate);box-shadow:0 0 0 2px #f0c8c8}
.tl-dot.latest{width:12px;height:12px;left:-18px;top:4px}
.tl-date{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:3px}
.tl-text{font-size:13px;color:var(--ink);line-height:1.55}
.tl-item.latest .tl-text{font-weight:600}
.tl-latest{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}
.tl-latest.house{background:#c8d8f0;color:var(--house)}
.tl-latest.senate{background:#f0c8c8;color:var(--senate)}
.no-actions{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px;font-style:italic}
.bill-link{padding:12px 16px;border-top:1px solid var(--border)}
.view-link{color:var(--rust);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-decoration:none}
/* VOTES */
.filter-toolbar{padding:12px 16px;background:var(--cream);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.filter-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700}
.filter-hint{font-size:12px;color:var(--muted);margin-bottom:2px}
.pill-row{display:flex;flex-wrap:wrap;gap:6px}
.state-pill{display:flex;align-items:center;gap:4px;background:var(--ink);color:var(--paper);font-size:11px;font-weight:700;padding:3px 8px 3px 10px;border-radius:20px}
.pill-remove{background:none;border:none;color:var(--paper);font-size:14px;cursor:pointer;padding:0;line-height:1;opacity:.7}
.select-row{display:flex;gap:8px}
.st-select{flex:1;border:1px solid var(--border);background:var(--white);font-family:'Source Serif 4',serif;font-size:13px;padding:8px 10px;color:var(--ink);outline:none;border-radius:2px;cursor:pointer}
.add-btn{background:var(--rust);color:#fff;border:none;padding:8px 14px;font-family:'Source Serif 4',serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:2px;white-space:nowrap}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 12px;font-family:'Source Serif 4',serif;font-size:12px;cursor:pointer;border-radius:2px}
/* VOTE CARD */
.vote-bar-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.vote-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex;margin-bottom:6px}
.yea-bar{background:#27ae60;height:100%}
.nay-bar{background:var(--rust);height:100%}
.vote-counts{display:flex;gap:12px;font-size:12px}
.yea-cnt{color:#27ae60;font-weight:700}
.nay-cnt{color:var(--rust);font-weight:700}
.expand-vote{font-size:11px;color:var(--rust);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:8px;display:inline-block;cursor:pointer}
/* STATE BREAKDOWN */
.state-breakdown{border-top:1px solid var(--border);animation:slideIn .2s ease}
.state-section{border-bottom:1px solid var(--border)}
.state-section:last-child{border-bottom:none}
.state-hd{padding:10px 16px;background:var(--cream);display:flex;align-items:center;justify-content:space-between}
.state-name{font-size:13px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:1px}
.state-pills{display:flex;gap:6px}
.svote-pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.svote-pill.yea{background:#eafaf1;color:#27ae60}
.svote-pill.nay{background:#fdedec;color:var(--rust)}
.member-list{padding:8px 16px;display:flex;flex-direction:column;gap:8px}
.member-row{display:flex;align-items:center;gap:8px}
.member-name{font-size:13px;color:var(--ink);flex:1}
.member-party{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.party-D{background:#dce8f7;color:var(--dem)}
.party-R{background:#fde8e8;color:var(--rep)}
.party-I{background:#fdf3dc;color:var(--ind)}
.mvote{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
.mvote.yea{background:#eafaf1;color:#27ae60}
.mvote.nay{background:#fdedec;color:var(--rust)}
.mvote.nv{background:var(--cream);color:var(--muted)}
.no-state-msg{text-align:center;padding:16px;color:var(--muted);font-size:13px;font-style:italic;border-top:1px solid var(--border)}
/* REPS */
.reps-toolbar{padding:12px 16px;background:var(--cream);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.rep-card{border-bottom:1px solid var(--border);cursor:pointer}
.rep-card-hd{padding:14px 16px;transition:background .15s;display:flex;align-items:center;gap:12px}
.rep-card:hover .rep-card-hd{background:var(--cream)}
.rep-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.av-D{background:var(--dem)}
.av-R{background:var(--rep)}
.av-I{background:var(--ind)}
.rep-info{flex:1;min-width:0}
.rep-name-full{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:4px}
.rep-sub{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rep-party-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase}
.rep-meta{font-size:11px;color:var(--muted)}
.rep-expand{font-size:11px;color:var(--rust);font-weight:700}
.rep-body{border-top:1px solid var(--border);animation:slideIn .2s ease}
.rep-photo-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--cream)}
.rep-photo{width:72px;height:88px;object-fit:cover;border-radius:4px;border:2px solid var(--border);flex-shrink:0}
.rep-photo-info{flex:1}
.rep-photo-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.rep-photo-meta{font-size:12px;color:var(--muted);line-height:1.6}
.leg-section-lbl{padding:10px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700}
.leg-item{border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:flex-start;gap:10px}
.leg-item:last-child{border-bottom:none}
.leg-dot{width:10px;height:10px;border-radius:50%;background:var(--rust);flex-shrink:0;margin-top:4px}
.leg-info{flex:1;min-width:0}
.leg-num{font-size:10px;color:var(--rust);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.leg-title{font-size:13px;color:var(--ink);line-height:1.45;margin-bottom:3px}
.leg-date{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.leg-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#fdf3dc;color:var(--gold);white-space:nowrap;flex-shrink:0;margin-top:2px}
.rep-disclaimer{padding:10px 16px;font-size:11px;color:var(--muted);font-style:italic;border-top:1px solid var(--border)}
.load-more{display:block;width:calc(100% - 32px);margin:12px 16px;padding:10px;background:none;border:1px solid var(--border);color:var(--muted);font-family:'Source Serif 4',serif;font-size:13px;cursor:pointer;border-radius:2px}
/* EO */
.eo-card{border-bottom:1px solid var(--border);cursor:pointer}
.eo-card-hd{padding:16px;transition:background .15s}
.eo-card:hover .eo-card-hd{background:var(--cream)}
.eo-stamp{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.eo-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#5a3e8a}
.eo-pres-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.pres-trump{background:#fde8e8;color:#8a1a1a}
.pres-biden{background:#dce8f7;color:#1a3a6b}
.pres-obama{background:#e8f0dc;color:#2a5a1a}
.pres-default{background:var(--cream);color:var(--muted)}
.eo-facts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.eo-link{padding:12px 16px;border-top:1px solid var(--border)}
.eo-view-link{color:#5a3e8a;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-decoration:none}
</style>
</head>

<div id="app"></div>
<script>
// CONFIG
var API_KEY = ["v0ldeYX6FRtDB","acCehyfYmwPGQ","EVIxnISgz6y65N"].join("");
var API = "https://api.congress.gov/v3";
var CONGRESS = 119;

var ALL_STATES = ["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];
var ABBR = {"Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA","Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA","Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT","Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY"};
var ABBR_REV = {};
Object.keys(ABBR).forEach(function(k){ ABBR_REV[ABBR[k]] = k; });

// STATE
var state = {
  tab: "bills",
  bills: [], billsLoading: false, billsError: null,
  billFilter: "recent", billSearch: "", billSearchInput: "",
  expandedBill: null, billSummaries: {}, billActions: {},
  votes: [], votesLoading: false, votesError: null,
  voteChamber: "house", voteType: "rollcall",
  senateVotes: [], houseVotes: [],
  selectedStates: [], membersByState: {},
  expandedVote: null, rollMembers: {}, lawVoteDetails: {},
  reps: [], repsLoading: false, repsError: null,
  repsTotal: 0, repsOffset: 0,
  repSearch: "", repState: "", repChamber: "",
  expandedRep: null, repLeg: {}, expandedLeg: null, legSummaries: {},
  eos: [], eosLoading: false, eosError: null,
  expandedEO: null, eoSummaries: {}
};

// HELPERS
function fmt(d) {
  if (!d) return "-";
  var dt = new Date(d + (d.length === 10 ? "T12:00:00" : ""));
  return dt.toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"});
}
function statusLabel(bill) {
  var t = ((bill.latestAction && bill.latestAction.text) || "").toLowerCase();
  if (t.indexOf("signed") > -1 || t.indexOf("became public law") > -1 || t.indexOf("enacted") > -1) return "signed";
  if (t.indexOf("passed") > -1 || t.indexOf("agreed to") > -1 || t.indexOf("presented to president") > -1) return "passed";
  if (t.indexOf("committee") > -1 || t.indexOf("referred") > -1) return "committee";
  if (t.indexOf("failed") > -1 || t.indexOf("defeated") > -1 || t.indexOf("vetoed") > -1) return "failed";
  return "introduced";
}
function statusClass(s) {
  return {signed:"b-sign",passed:"b-pass",committee:"b-comm",failed:"b-fail",introduced:"b-intro"}[s] || "b-intro";
}
function statusText(s) {
  return {signed:"Signed into Law",passed:"Passed",committee:"In Committee",failed:"Failed",introduced:"Introduced"}[s] || "Introduced";
}
function classifyAction(a) {
  var type = (a.type || "").toLowerCase();
  var text = (a.text || "").toLowerCase();
  var code = (a.actionCode || "").toUpperCase();
  if (type.indexOf("becamelaw") > -1 || text.indexOf("signed by president") > -1) return "both";
  if (type.indexOf("senate") > -1 || (text.indexOf("senate") > -1 && text.indexOf("house") === -1)) return "senate";
  if (type.indexOf("house") > -1 || (text.indexOf("house") > -1 && text.indexOf("senate") === -1)) return "house";
  if (code.charAt(0) === "S") return "senate";
  if (code.charAt(0) === "H" || code.charAt(0) === "E" || code.charAt(0) === "B") return "house";
  return "both";
}
function partyClass(p) {
  if (p === "D" || p === "Democratic") return "D";
  if (p === "R" || p === "Republican") return "R";
  return "I";
}
function partyLabel(p) {
  if (p === "D" || p === "Democratic") return "Democrat";
  if (p === "R" || p === "Republican") return "Republican";
  return "Independent";
}
function votePos(v) {
  if (!v) return "nv";
  var vl = v.toLowerCase().trim();
  if (vl === "yea" || vl === "aye" || vl === "yes") return "yea";
  if (vl === "nay" || vl === "no") return "nay";
  return "nv";
}
function voteTxt(v) {
  var p = votePos(v);
  if (p === "yea") return "Yea";
  if (p === "nay") return "Nay";
  return "Not Voting";
}
function presClass(name) {
  if (!name) return "pres-default";
  var n = name.toLowerCase();
  if (n.indexOf("trump") > -1) return "pres-trump";
  if (n.indexOf("biden") > -1) return "pres-biden";
  if (n.indexOf("obama") > -1) return "pres-obama";
  return "pres-default";
}
function isSenator(member) {
  var terms = (member.terms && member.terms.item) || [];
  return terms.some(function(t){ return t.chamber && t.chamber.toLowerCase().indexOf("senate") > -1; }) ||
    (member.chamber || "").toLowerCase().indexOf("senate") > -1 ||
    ((member.title || "").toLowerCase().indexOf("senator") > -1);
}
function sortByDate(arr) {
  return arr.slice().sort(function(a,b){
    var da = new Date((a.latestAction && a.latestAction.actionDate) || a.updateDate || "1900-01-01");
    var db = new Date((b.latestAction && b.latestAction.actionDate) || b.updateDate || "1900-01-01");
    return db - da;
  });
}
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k){
    if (k === "className") e.className = attrs[k];
    else if (k === "style" && typeof attrs[k] === "object") Object.assign(e.style, attrs[k]);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (children) {
    if (typeof children === "string") e.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c){ if (c) e.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    else e.appendChild(typeof children === "string" ? document.createTextNode(children) : children);
  }
  return e;
}
function spinner() {
  return el("div", {className:"spinner"});
}

// API
function apiFetch(url) {
  return fetch(url + (url.indexOf("?") > -1 ? "&" : "?") + "api_key=" + API_KEY + "&format=json");
}

function loadBills() {
  state.billsLoading = true; state.billsError = null; render();
  var q = state.billSearch;
  var filter = state.billFilter;
  var url;
  if (q) {
    var trimmed = q.trim();
    var match = trimmed.match(/^(hr|s|hjres|sjres|hconres|sconres|hres|sres)\s*(\d+)$/i);
    if (match) {
      var type = match[1].toLowerCase();
      var num = match[2];
      apiFetch(API + "/bill/" + CONGRESS + "/" + type + "/" + num)
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(d){
          state.bills = (d && d.bill) ? [d.bill] : [];
          state.billsLoading = false; render();
        }).catch(function(){ state.billsError = "Could not load bills."; state.billsLoading = false; render(); });
      return;
    }
    Promise.all([
      apiFetch(API + "/bill?query=" + encodeURIComponent(trimmed) + "&limit=20&sort=updateDate+desc&congress=" + CONGRESS),
      apiFetch(API + "/bill?query=" + encodeURIComponent(trimmed) + "&limit=10&sort=updateDate+desc&congress=" + (CONGRESS-1))
    ]).then(function(rs){ return Promise.all(rs.map(function(r){ return r.ok ? r.json() : {bills:[]}; })); })
    .then(function(ds){
      var all = (ds[0].bills||[]).concat((ds[1].bills||[]).filter(function(b){
        return !(ds[0].bills||[]).find(function(x){ return x.number===b.number && x.type===b.type; });
      }));
      var lower = trimmed.toLowerCase();
      all.sort(function(a,b){
        var at = (a.title||"").toLowerCase().indexOf(lower) > -1 ? 1 : 0;
        var bt = (b.title||"").toLowerCase().indexOf(lower) > -1 ? 1 : 0;
        if (bt !== at) return bt - at;
        return new Date((b.latestAction&&b.latestAction.actionDate)||b.updateDate||0) - new Date((a.latestAction&&a.latestAction.actionDate)||a.updateDate||0);
      });
      state.bills = all; state.billsLoading = false; render();
    }).catch(function(){ state.billsError = "Could not load bills."; state.billsLoading = false; render(); });
    return;
  }
  if (filter === "passed") url = API + "/law/" + CONGRESS + "/pub?limit=20&sort=updateDate+desc";
  else if (filter === "lastsession") url = API + "/law/" + (CONGRESS-1) + "/pub?limit=20&sort=updateDate+desc";
  else if (filter === "introduced") url = API + "/bill?limit=50&sort=updateDate+desc&congress=" + CONGRESS;
  else if (filter === "committee") url = API + "/bill?limit=50&sort=updateDate+desc&congress=" + CONGRESS;
  else url = API + "/bill?limit=20&sort=updateDate+desc";

  apiFetch(url).then(function(r){ return r.ok ? r.json() : {bills:[]}; })
  .then(function(d){
    var bills = d.bills || [];
    if (filter === "introduced") bills = bills.filter(function(b){
      var t = ((b.latestAction&&b.latestAction.text)||"").toLowerCase();
      return t.indexOf("introduced") > -1 || t.indexOf("referred to the") > -1;
    });
    if (filter === "committee") bills = bills.filter(function(b){
      var t = ((b.latestAction&&b.latestAction.text)||"").toLowerCase();
      return (t.indexOf("committee") > -1 || t.indexOf("subcommittee") > -1) && t.indexOf("signed") === -1;
    });
    state.bills = sortByDate(bills).slice(0,20);
    state.billsLoading = false; render();
  }).catch(function(){ state.billsError = "Could not load bills."; state.billsLoading = false; render(); });
}

function loadBillSummary(bill) {
  var id = bill.type + bill.number + "-" + bill.congress;
  if (state.billSummaries[id] !== undefined) return;
  state.billSummaries[id] = "loading";
  var type = (bill.type||"hr").toLowerCase();
  apiFetch(API + "/bill/" + bill.congress + "/" + type + "/" + bill.number + "/summaries")
  .then(function(r){ return r.ok ? r.json() : {summaries:[]}; })
  .then(function(d){
    var sums = d.summaries || [];
    if (sums.length > 0) {
      sums.sort(function(a,b){ return new Date(b.actionDate) - new Date(a.actionDate); });
      var txt = (sums[0].text||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
      state.billSummaries[id] = txt.length > 20 ? txt : buildFallback(bill);
    } else {
      state.billSummaries[id] = buildFallback(bill);
    }
    render();
  }).catch(function(){ state.billSummaries[id] = buildFallback(bill); render(); });
}

function buildFallback(bill) {
  var action = (bill.latestAction && bill.latestAction.text) || "";
  var chamber = bill.originChamber || "Congress";
  return (bill.type||"Bill") + " " + bill.number + " was introduced in the " + chamber + " during the " + bill.congress + "th Congress." + (action ? " Most recent action: " + action : "");
}

function loadBillActions(bill) {

// Fetch vote details (roll call totals + member votes) when a law is expanded
function loadLawVoteDetails(law) {
  var id = law.type + law.number;
  if (state.lawVoteDetails[id] !== undefined) return;
  state.lawVoteDetails[id] = null;

  var details = { yeas:null, nays:null, members:{} };
  var lawType = (law.type||"hr").toUpperCase();
  var lawNum = law.number;
  var billType = lawType.toLowerCase();

  apiFetch(API + "/bill/" + law.congress + "/" + billType + "/" + lawNum + "/actions?limit=50")
  .then(function(r){ return r.ok ? r.json() : {actions:[]}; })
  .then(function(d){
    var actions = d.actions || [];
    for (var i = 0; i < actions.length; i++) {
      var t = actions[i].text || "";
      var tl = t.toLowerCase();
      if (!details.yeas && (tl.indexOf("passed") > -1 || tl.indexOf("agreed to") > -1)) {
        var vm = t.match(/\b([1-3]\d{2}|4[0-2]\d|435)\s*[-to]+\s*(\d{1,3})\b/);
        if (vm) {
          var y = parseInt(vm[1]); var n = parseInt(vm[2]);
          if (y + n >= 50 && y + n <= 445) { details.yeas = y; details.nays = n; }
        }
      }
    }

    apiFetch(API + "/house-vote/" + law.congress + "?legislationType=" + lawType + "&legislationNumber=" + lawNum + "&limit=20")
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(vd){
      if (!vd || !vd.houseRollCallVotes || vd.houseRollCallVotes.length === 0) {
        state.lawVoteDetails[id] = details; render(); return;
      }
      var votes = vd.houseRollCallVotes;
      // Last vote is always the final passage vote
      var passageVote = votes[votes.length - 1];
      if (!passageVote || !passageVote.url) {
        state.lawVoteDetails[id] = details; render(); return;
      }

      details._voteRoll = passageVote.rollCallNumber;

      var baseUrl = passageVote.url.replace(/[?#].*$/, "").replace(/\/$/, "");
      var memberUrl = baseUrl + "/members?limit=500&api_key=" + API_KEY + "&format=json";

      fetch(memberUrl)
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(md){
        if (md) {
          var container = md.houseRollCallVoteMemberVotes || md;
          // Field is "bioguideID" (capital D) and "voteCast" per API response
          var items = [];
          if (container.results) {
            items = Array.isArray(container.results) ? container.results :
                    Array.isArray(container.results.item) ? container.results.item :
                    container.results.item ? [container.results.item] : [];
          }
          items.forEach(function(m) {
            var bid = m.bioguideID || m.bioguideId;
            var vc = m.voteCast;
            if (bid && vc) details.members[bid] = vc;
          });
        }
        state.lawVoteDetails[id] = details;
        render();
      }).catch(function(){ state.lawVoteDetails[id] = details; render(); });
    }).catch(function(){ state.lawVoteDetails[id] = details; render(); });
  }).catch(function(){ state.lawVoteDetails[id] = {}; render(); });
}

function loadMembersByState(stateCode) {
  if (state.membersByState[stateCode]) return;
  state.membersByState[stateCode] = [];
  var all = [];
  function fetchPage(offset) {
    apiFetch(API + "/member/" + stateCode + "?limit=100&offset=" + offset + "&currentMember=true")
    .then(function(r){ return r.ok ? r.json() : {members:[],pagination:{count:0}}; })
    .then(function(d){
      var batch = d.members || [];
      all = all.concat(batch);
      var total = (d.pagination && d.pagination.count) || 0;
      if (all.length < total && batch.length === 50) { fetchPage(offset + 50); }
      else {
        apiFetch(API + "/member/" + stateCode + "?limit=10&offset=0&currentMember=true&chamber=senate")
        .then(function(r){ return r.ok ? r.json() : {members:[]}; })
        .then(function(d2){
          var senators = d2.members || [];
          senators.forEach(function(s){
            if (!all.find(function(m){ return m.bioguideId === s.bioguideId; })) all.unshift(s);
          });
          all.sort(function(a,b){
            var as = isSenator(a) ? 0 : 1; var bs = isSenator(b) ? 0 : 1;
            return as - bs;
          });
          state.membersByState[stateCode] = all; render();
        }).catch(function(){ state.membersByState[stateCode] = all; render(); });
      }
    }).catch(function(){ state.membersByState[stateCode] = all; render(); });
  }
  fetchPage(0);
}

// BILL CARD
function renderBillCard(bill) {
  var id = bill.type + bill.number + "-" + bill.congress;
  var isOpen = state.expandedBill === id;
  var s = statusLabel(bill);
  var card = el("div", {className:"bill-card" + (isOpen ? " open" : "")});
  var hd = el("div", {className:"bill-card-hd", onClick:function(){
    if (state.expandedBill === id) { state.expandedBill = null; }
    else {
      state.expandedBill = id;
      loadBillSummary(bill);
      loadBillActions(bill);
      state.billChamberTab = bill.originChamber && bill.originChamber.toLowerCase() === "senate" ? "senate" : "house";
    }
    render();
  }});
  var meta = el("div", {className:"bill-meta"});
  meta.appendChild(el("span", {className:"bill-num"}, bill.type + " " + bill.number));
  meta.appendChild(renderBadge(statusClass(s), statusText(s)));
  hd.appendChild(meta);
  hd.appendChild(el("div", {className:"bill-title"}, bill.title));
  if (!isOpen) {
    var snippet = (bill.latestAction && bill.latestAction.text) ? bill.latestAction.text.slice(0,120) + (bill.latestAction.text.length > 120 ? "..." : "") : "No recent action recorded.";
    hd.appendChild(el("div", {className:"bill-snippet"}, snippet));

  footer.appendChild(el("span", {className:"expand-lbl"}, isOpen ? "^ Close" : "v Details"));
  hd.appendChild(footer);
  card.appendChild(hd);
  if (isOpen) {
    var body = el("div", {className:"bill-body"});
    var sumBox = el("div", {className:"summary-box"});
    sumBox.appendChild(el("div", {className:"summary-lbl"}, "Official Summary"));
    var sum = state.billSummaries[id];

      sl.appendChild(spinner()); sl.appendChild(document.createTextNode(" Loading summary..."));
      sumBox.appendChild(sl);
    } else { sumBox.appendChild(el("div", {className:"summary-txt"}, sum)); }
    body.appendChild(sumBox);
    var facts = el("div", {className:"facts"});
    [[bill.congress+"th","Congress"],[bill.originChamber||"-","Origin"],[((bill.sponsors&&bill.sponsors[0]&&bill.sponsors[0].fullName)||"Not listed"),"Sponsor"],[fmt(bill.updateDate),"Updated"]].forEach(function(pair){
      var f = el("div", {className:"fact"});

      f.appendChild(el("div", {className:"fact-val"}, pair[0]));
      facts.appendChild(f);
    });
    body.appendChild(facts);
    var actions = state.billActions[id] || [];
    var chTab = state.billChamberTab || "house";
    var houseActs = actions.filter(function(a){ var c=classifyAction(a); return c==="house"||c==="both"; });
    var senateActs = actions.filter(function(a){ var c=classifyAction(a); return c==="senate"||c==="both"; });
    var tabs = el("div", {className:"ch-tabs"});
    ["house","senate"].forEach(function(ch){
      var t = el("button", {className:"ch-tab " + ch + (chTab===ch?" active":""), onClick:function(){ state.billChamberTab=ch; render(); }});
      var dot = el("span", {className:"ch-dot " + ch}); t.appendChild(dot);

    var curActs = chTab === "house" ? houseActs : senateActs;

      chBody.appendChild(ld);

      chBody.appendChild(el("div",{className:"no-actions"},"No "+(chTab==="house"?"House":"Senate")+" actions recorded yet."));
    } else {
      var tl = el("div", {className:"timeline"});
      curActs.forEach(function(a,i){
        var item = el("div", {className:"tl-item" + (i===0?" latest":"")});

// VOTE CARD

  var hd = el("div",{className:"bill-card-hd",onClick:function(){

      ld.appendChild(spinner()); ld.appendChild(document.createTextNode(" Loading vote data..."));
      body.appendChild(ld);
    } else {

      body.appendChild(el("div",{className:"no-state-msg"},"Passed by voice vote - no recorded vote data available."));
    } else if(state.selectedStates.length===0){
      body.appendChild(el("div",{className:"no-state-msg"},"Select a state above to see your representatives."));
    } else {

      state.selectedStates.forEach(function(st){
        var abbr=ABBR[st]||st;
        var members=state.membersByState[abbr]||[];
        var houseMembers=members.filter(function(m){ return !isSenator(m); });
        var sec=el("div",{className:"state-section"});
        var sHd=el("div",{className:"state-hd"});
        sHd.appendChild(el("span",{className:"state-name"},st));
        if(hasMemberData){
          var yeasC=houseMembers.filter(function(m){ return votePos(memberMap[m.bioguideId]||memberMap[m.bioguideID])==="yea"; }).length;
          var naysC=houseMembers.filter(function(m){ return votePos(memberMap[m.bioguideId]||memberMap[m.bioguideID])==="nay"; }).length;
          var pills=el("div",{className:"state-pills"});

          sHd.appendChild(pills);
        }

        if(members.length===0){
          ml.appendChild(el("div",{style:{fontSize:"12px",color:"var(--muted)",fontStyle:"italic",padding:"4px 0"}},"Loading members..."));
        } else if(houseMembers.length===0){
          ml.appendChild(el("div",{style:{fontSize:"12px",color:"var(--muted)",fontStyle:"italic",padding:"4px 0"}},"No House members found for "+st));
        } else {
          houseMembers.forEach(function(m){
            var row=el("div",{className:"member-row"});
            var party=partyClass(m.partyName||m.party||"");
            row.appendChild(el("span",{className:"member-name"},m.name||"Member"));
            row.appendChild(el("span",{className:"member-party party-"+party},party));
            if(hasMemberData){
              var vp=memberMap[m.bioguideId]||memberMap[m.bioguideID];
              row.appendChild(vp
                ? el("span",{className:"mvote "+votePos(vp)},voteTxt(vp))
                : el("span",{style:{fontSize:"10px",color:"var(--muted)",fontStyle:"italic"}},"No record"));
            }
            ml.appendChild(row);
          });
        }
        sec.appendChild(ml); body.appendChild(sec);
      });
      if(!hasMemberData){
        body.appendChild(el("div",{style:{padding:"10px 16px",fontSize:"11px",color:"var(--muted)",fontStyle:"italic",borderTop:"1px solid var(--border)"}},"Individual Yea/Nay per member not yet available - Congress.gov is still indexing this vote."));
      }
    }
    } // end else details loaded
    card.appendChild(body);
  }
  return card;
}

      var pRow = el("div",{className:"rep-photo-row"});
      var img = el("img",{className:"rep-photo",src:"https://bioguide.congress.gov/bioguide/photo/"+member.bioguideId[0]+"/"+member.bioguideId+".jpg",alt:name});
      img.onerror = function(){ img.style.display="none"; };
      pRow.appendChild(img);
      var pi = el("div",{className:"rep-photo-info"});
      pi.appendChild(el("div",{className:"rep-photo-name"},name));
      pi.appendChild(el("div",{className:"rep-photo-meta"},partyLabel(party)+" | "+(sen?"Senate":"House")+"\n"+stateAbbr+district));
      pRow.appendChild(pi); body.appendChild(pRow);
    }
    var leg = state.repLeg[id];
    if(!leg){

      ld.appendChild(spinner()); ld.appendChild(document.createTextNode(" Loading sponsored legislation...")); body.appendChild(ld);
    } else if(leg.length===0){
      body.appendChild(el("div",{className:"rep-disclaimer"},"No sponsored legislation found."));
    } else {
      body.appendChild(el("div",{className:"leg-section-lbl"},"Sponsored Legislation"));
      leg.forEach(function(l, li_idx){
        var legId = (member.bioguideId||"") + "-" + l.type + l.number;
        var isLegOpen = state.expandedLeg && state.expandedLeg === legId;
        var item=el("div",{className:"leg-item",style:{flexDirection:"column",gap:"0",padding:"0"}});
        
        // Header row
        var hrow = el("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px",padding:"12px 16px",cursor:"pointer"},onClick:function(){
          if(state.expandedLeg === legId){ state.expandedLeg = null; }
          else {
            state.expandedLeg = legId;
            // Load summary if not already loaded
            if(!state.legSummaries) state.legSummaries = {};
            if(!state.legSummaries[legId]){
              state.legSummaries[legId] = "loading";
              var type = (l.type||"hr").toLowerCase();
              // Try current congress first, then previous - sponsored leg API may not include congress field
              var congress = l.congress || CONGRESS;
              function tryFetchSummary(congressNum) {
                apiFetch(API + "/bill/" + congressNum + "/" + type + "/" + l.number + "/summaries")
                .then(function(r){ return r.ok ? r.json() : {summaries:[]}; })
                .then(function(d){
                  var sums = d.summaries || [];
                  if(sums.length > 0){
                    sums.sort(function(a,b){ return new Date(b.actionDate)-new Date(a.actionDate); });
                    var txt = (sums[0].text||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
                    if(txt.length > 20){ state.legSummaries[legId] = txt; render(); return; }
                  }
                  // If no summary found and we tried current, try previous congress
                  if(congressNum === CONGRESS && !l.congress){
                    tryFetchSummary(CONGRESS - 1);
                  } else {
                    state.legSummaries[legId] = "No official summary available yet for this bill.";
                    render();
                  }
                }).catch(function(){
                  state.legSummaries[legId] = "Could not load summary."; render();
                });
              }
              tryFetchSummary(congress);
            }
          }
          render();
        }});
        hrow.appendChild(el("div",{className:"leg-dot",style:{marginTop:"4px"}}));
        var li=el("div",{className:"leg-info"});
        li.appendChild(el("div",{className:"leg-num"},l.type+" "+l.number));
        li.appendChild(el("div",{className:"leg-title",style:{fontWeight:"600",color:"var(--ink)"}},l.title));
        li.appendChild(el("div",{className:"leg-date"},fmt(l.latestAction&&l.latestAction.actionDate)));
        hrow.appendChild(li);
        var right = el("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px",flexShrink:"0"}});
        right.appendChild(el("span",{className:"leg-badge"},"Sponsor"));
        right.appendChild(el("span",{style:{fontSize:"10px",color:"var(--rust)",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.5px"}},isLegOpen?"^ Less":"v More"));
        hrow.appendChild(right);
        item.appendChild(hrow);

        // Expandable summary
        if(isLegOpen){
          var drop = el("div",{style:{background:"var(--cream)",borderTop:"1px solid var(--border)",padding:"12px 16px",animation:"slideIn .2s ease"}});
          var sumLbl = el("div",{style:{fontSize:"10px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1.5px",color:"var(--gold)",marginBottom:"6px"}});
          sumLbl.textContent = "Official Summary";
          drop.appendChild(sumLbl);
          var sumTxt = (state.legSummaries && state.legSummaries[legId]) || "loading";
          if(sumTxt === "loading"){
            var ld = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",color:"var(--muted)",fontSize:"13px"}});
            ld.appendChild(spinner()); ld.appendChild(document.createTextNode(" Loading summary..."));
            drop.appendChild(ld);
          } else {
            drop.appendChild(el("div",{style:{fontSize:"13px",lineHeight:"1.7",color:"var(--ink)",marginBottom:"12px"}},sumTxt));
          }
          var congress = l.congress || CONGRESS;
          var chamberSlug = (l.type||"").toUpperCase().startsWith("S") ? "senate" : "house";
          var billUrl = "https://www.congress.gov/bill/"+congress+"th-congress/"+chamberSlug+"-bill/"+l.number;
          var linkBtn = el("a",{href:billUrl,target:"_blank",style:{display:"inline-block",background:"var(--rust)",color:"#fff",fontSize:"12px",fontWeight:"700",padding:"8px 14px",borderRadius:"2px",textDecoration:"none",textTransform:"uppercase",letterSpacing:"1px"}},"Read Full Bill on Congress.gov >");
          drop.appendChild(linkBtn);
          item.appendChild(drop);
        }
        body.appendChild(item);
      });
    }
    if(member.bioguideId){
      var disc=el("div",{className:"rep-disclaimer"});
      var al=el("a",{href:"https://www.congress.gov/member/"+member.bioguideId,target:"_blank",style:{color:"var(--rust)",fontWeight:"700",textDecoration:"none"}},"View full profile on Congress.gov >");
      disc.appendChild(al); body.appendChild(disc);
    }
    card.appendChild(body);
  }
  return card;
}

      renderRepsList();
    });
    ri.addEventListener("keydown",function(e){ if(e.key==="Enter"){ this.blur(); } });
    rt.appendChild(ri);
    var rfrow=el("div",{style:{display:"flex",gap:"8px"}});
    var rsSel=el("select",{className:"st-select"});
    rsSel.appendChild(el("option",{value:""},"All States"));
    ALL_STATES.forEach(function(s){ var o=el("option",{value:s},s); if(s===state.repState) o.selected=true; rsSel.appendChild(o); });
    rsSel.addEventListener("change",function(){ state.repState=this.value; state.reps=[]; state.expandedRep=null; loadAllReps(); });
    rfrow.appendChild(rsSel);
    var rcSel=el("select",{className:"st-select"});
    [["","Both Chambers"],["Senate","Senate"],["House","House"]].forEach(function(opt){ var o=el("option",{value:opt[0]},opt[1]); if(opt[0]===state.repChamber) o.selected=true; rcSel.appendChild(o); });
    rcSel.addEventListener("change",function(){ state.repChamber=this.value; render(); });
    rfrow.appendChild(rcSel); rt.appendChild(rfrow); div.appendChild(rt);
    var filtered=state.reps.filter(function(m){
      var name=m.name||m.invertedOrderName||"";
      var mn=!state.repSearch||name.toLowerCase().indexOf(state.repSearch.toLowerCase())>-1;
      var sen=isSenator(m);
      var mc=!state.repChamber||(state.repChamber==="Senate"?sen:!sen);
      return mn&&mc;
    });
    var repsListContainer = el("div",{id:"reps-list-container"});
    repsListContainer.appendChild(renderSectionLabel((state.repState?state.repState+" - ":"")+filtered.length+" of "+state.repsTotal+" Current Members"));
    if(state.repsLoading){ repsListContainer.appendChild(renderLoading("Loading members from Congress.gov...")); }
    else if(state.repsError){ repsListContainer.appendChild(renderError(state.repsError)); }
    else if(filtered.length===0){ repsListContainer.appendChild(renderEmpty("","No results","Try adjusting your search or filters.")); }
    else {
      filtered.forEach(function(m){ repsListContainer.appendChild(renderRepCard(m)); });
      if(!state.repState && state.reps.length < state.repsTotal){
        var lm=el("button",{className:"load-more",onClick:function(){ loadMoreReps(); }},"Load more ("+state.reps.length+" of "+state.repsTotal+")");
        repsListContainer.appendChild(lm);
      }
    }
    content.appendChild(repsListContainer);

    // Restore focus to search input after render if user was typing
    if(state._repSearchFocus){
      state._repSearchFocus = false;
      setTimeout(function(){
        var inp = document.querySelector(".reps-toolbar .search-input");
        if(inp){ inp.focus(); var len=inp.value.length; inp.setSelectionRange(len,len); }
      }, 0);
    }
  } // end reps tab

  div.appendChild(content);
  app.appendChild(div);
}

// Standalone function to update just the reps list without full re-render
function renderRepsList() {
  var existing = document.getElementById("reps-list-container");
  if(!existing) return;
  var newList = el("div",{id:"reps-list-container"});
  var filt=state.reps.filter(function(m){
    var name=m.name||m.invertedOrderName||"";
    var mn=!state.repSearch||name.toLowerCase().indexOf(state.repSearch.toLowerCase())>-1;
    var sen=isSenator(m); var mc=!state.repChamber||(state.repChamber==="Senate"?sen:!sen);
    return mn&&mc;
  });
  newList.appendChild(renderSectionLabel((state.repState?state.repState+" - ":"")+filt.length+" of "+state.repsTotal+" Current Members"));
  if(state.repsLoading){ newList.appendChild(renderLoading("Loading...")); }
  else if(filt.length===0){ newList.appendChild(renderEmpty("","No results","Try adjusting your search or filters.")); }
  else { filt.forEach(function(m){ newList.appendChild(renderRepCard(m)); }); }
  existing.parentNode.replaceChild(newList, existing);
  setTimeout(function(){
    var inp = document.querySelector(".reps-toolbar .search-input");
    if(inp){ inp.focus(); var len=inp.value.length; inp.setSelectionRange(len,len); }
  }, 0);
}

// INIT
render();
loadBills();
</script>
