workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      node: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ayden.trackthehill
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: npx cap add ios
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            DEVELOPMENT_TEAM=9N38SB2GF2 \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER=TrackTheHill \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive
      - name: Export IPA
        script: |
          cat > /tmp/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9N38SB2GF2</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportPath ios/App/export \
            -exportOptionsPlist /tmp/exportOptions.plist
    artifacts:
      - ios/App/export/*.ipa
