workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      node: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ayden.trackthehill
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: npx cap add ios
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set Team ID
        script: |
          grep -rl "DEVELOPMENT_TEAM" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ""/DEVELOPMENT_TEAM = 9N38SB2GF2/g' ios/App/App.xcodeproj/project.pbxproj
          grep "DEVELOPMENT_TEAM" ios/App/App.xcodeproj/project.pbxproj
      - name: Build iOS
        script: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            DEVELOPMENT_TEAM=9N38SB2GF2 \
            archive
    artifacts:
      - ios/App/App.xcarchive
